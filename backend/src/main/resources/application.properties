# ============================================
# CONFIGURACOES DO SERVIDOR
# ============================================
server.port=${PORT:8080}
server.servlet.context-path=/api

# ============================================
# BANCO DE DADOS (H2 em arquivo para persistencia)
# ============================================
spring.datasource.url=jdbc:h2:file:./giroerp;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ============================================
# JPA
# ============================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# ============================================
# FLYWAY (Desabilitado para H2)
# ============================================
spring.flyway.enabled=false

# ============================================
# H2 CONSOLE
# ============================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ============================================
# SEGURANCA E JWT
# ============================================
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ============================================
# CORS
# ============================================
cors.allowed.origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ============================================
# LOGGING
# ============================================
logging.level.com.giroerp=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=DEBUG

# ============================================
# DOCUMENTACAO (Swagger)
# ============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ============================================
# PERFORMANCE
# ============================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000