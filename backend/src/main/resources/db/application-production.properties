# ============================================
# SERVER
# ============================================
server.port=${PORT:8080}
server.servlet.context-path=/api

# ============================================
# H2 DATABASE
# ============================================
spring.datasource.url=jdbc:h2:file:/tmp/giroerp;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ============================================
# JPA
# ============================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# H2 CONSOLE
# ============================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ============================================
# FLYWAY (desabilitado)
# ============================================
spring.flyway.enabled=false

# ============================================
# JWT - PROPRIEDADES OBRIGATėRIAS
# ============================================
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ============================================
# CORS
# ============================================
cors.allowed.origins=${ALLOWED_ORIGINS:http://localhost:3000,https://orbnoc-frontend.onrender.com}

# ============================================
# LOGGING
# ============================================
logging.level.com.giroerp=INFO
logging.level.org.springframework.web=ERROR
logging.level.org.hibernate=WARN